plugins:
  - rubocop-minitest
  - rubocop-performance
  - rubocop-rake

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.4
  Exclude:
    - examples/**/*

# --- Keep disabled (justified) ---
Layout/HashAlignment:
  Enabled: false

Naming/MethodParameterName:
  Enabled: false

Style/AsciiComments:
  Enabled: false

Style/ParallelAssignment:
  Enabled: false

# --- Re-enable with thresholds ---
Metrics/MethodLength:
  Max: 25
  CountAsOne:
    - hash
    - array
    - heredoc

Metrics/AbcSize:
  Max: 35
  Exclude:
    - test/**/*_test.rb

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/PerceivedComplexity:
  Max: 10

Metrics/BlockLength:
  Exclude:
    - test/**/*_test.rb
    - '*.gemspec'

Metrics/ClassLength:
  Max: 150
  Exclude:
    - test/**/*_test.rb

Metrics/ParameterLists:
  Max: 6

Minitest/MultipleAssertions:
  Max: 15

Style/Documentation:
  Enabled: false

Gemspec/DevelopmentDependencies:
  Enabled: false
